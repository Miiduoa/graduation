# 01_onboarding.yaml
# Onboarding Flow Test
# 測試首次使用者的引導流程

appId: com.campus.app
name: Onboarding Flow
tags:
  - smoke
  - onboarding

---

# 清除 App 資料以模擬首次使用
- clearState

# 啟動 App
- launchApp

# 等待 Onboarding 畫面載入
- assertVisible:
    text: "歡迎使用校園助手"
    timeout: 10000

# 截圖 - Onboarding 第一頁
- takeScreenshot: onboarding_page_1

# 滑動到下一頁
- swipe:
    direction: LEFT
    duration: 300

# 驗證第二頁內容
- assertVisible:
    text: "探索校園"

# 截圖 - Onboarding 第二頁
- takeScreenshot: onboarding_page_2

# 滑動到下一頁
- swipe:
    direction: LEFT
    duration: 300

# 驗證第三頁內容
- assertVisible:
    text: "即時資訊"

# 截圖 - Onboarding 第三頁
- takeScreenshot: onboarding_page_3

# 滑動到下一頁
- swipe:
    direction: LEFT
    duration: 300

# 驗證第四頁（最後一頁）
- assertVisible:
    text: "開始使用"

# 截圖 - Onboarding 第四頁
- takeScreenshot: onboarding_page_4

# 點擊開始使用按鈕
- tapOn:
    text: "開始使用"

# 等待主畫面載入
- assertVisible:
    text: "公告"
    timeout: 10000

# 截圖 - 主畫面
- takeScreenshot: main_screen_after_onboarding

# 驗證底部導覽列
- assertVisible:
    text: "活動"
- assertVisible:
    text: "地圖"
- assertVisible:
    text: "餐廳"
- assertVisible:
    text: "我的"
