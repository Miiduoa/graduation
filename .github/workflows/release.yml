name: Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options:
          - production
          - preview
      submit:
        description: 'Submit to app stores after build'
        required: true
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: |
          pnpm --filter mobile test --ci --maxWorkers=2
          pnpm --filter web test --ci
          pnpm --filter functions test --runInBand

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/mobile/app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.platform == 'all' || inputs.platform == 'ios'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        working-directory: apps/mobile
        run: npx eas-cli build --platform ios --profile ${{ inputs.profile }} --non-interactive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Submit to App Store
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile
        run: npx eas-cli submit --platform ios --latest --non-interactive
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: preflight
    if: inputs.platform == 'all' || inputs.platform == 'android'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        working-directory: apps/mobile
        run: npx eas-cli build --platform android --profile ${{ inputs.profile }} --non-interactive

      - name: Submit to Google Play
        if: inputs.submit && inputs.profile == 'production'
        working-directory: apps/mobile
        run: npx eas-cli submit --platform android --latest --non-interactive

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build-ios, build-android]
    if: always() && inputs.profile == 'production' && (needs.build-ios.result == 'success' || needs.build-android.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.build_number }}
          name: v${{ needs.preflight.outputs.version }}
          body: |
            ## Release v${{ needs.preflight.outputs.version }}

            **Build:** ${{ needs.preflight.outputs.build_number }}
            **Platform:** ${{ inputs.platform }}
            **Profile:** ${{ inputs.profile }}

            ### Release Notes
            ${{ inputs.release_notes || 'No release notes provided.' }}

            ### Build Status
            - iOS: ${{ needs.build-ios.result || 'skipped' }}
            - Android: ${{ needs.build-android.result || 'skipped' }}
          draft: true
          prerelease: ${{ inputs.profile != 'production' }}
