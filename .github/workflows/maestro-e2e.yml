name: E2E Tests (Maestro)

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full
          - onboarding
          - authentication
          - announcements
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/maestro-e2e.yml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Maestro E2E Tests
    runs-on: macos-latest
    timeout-minutes: 60
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            device: "iPhone 15"
          # Android can be added later
          # - platform: android
          #   device: "Pixel_7_API_34"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Verify Maestro Installation
        run: maestro --version

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup iOS Simulator
        if: matrix.platform == 'ios'
        run: |
          # List available simulators
          xcrun simctl list devices available
          
          # Boot the simulator
          SIMULATOR_ID=$(xcrun simctl list devices available | grep "${{ matrix.device }}" | head -1 | grep -oE '\([A-F0-9-]+\)' | tr -d '()')
          if [ -n "$SIMULATOR_ID" ]; then
            xcrun simctl boot "$SIMULATOR_ID" || true
            echo "SIMULATOR_UDID=$SIMULATOR_ID" >> $GITHUB_ENV
          fi

      - name: Build Expo Development Client
        working-directory: apps/mobile
        run: |
          # Export for iOS Simulator
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme CampusApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -derivedDataPath build \
            build || echo "Build may have warnings"
        continue-on-error: true

      - name: Start Metro Bundler
        working-directory: apps/mobile
        run: |
          npx expo start --ios --no-dev --minify &
          METRO_PID=$!
          echo "METRO_PID=$METRO_PID" >> $GITHUB_ENV
          
          # Wait for Metro to be ready
          echo "Waiting for Metro bundler..."
          sleep 45
          
          # Check if Metro is running
          curl -s http://localhost:8081/status || echo "Metro status check failed"

      - name: Run Smoke Tests
        if: github.event.inputs.test_suite == 'smoke' || github.event.inputs.test_suite == ''
        working-directory: apps/mobile
        run: |
          mkdir -p .maestro/results
          maestro test .maestro/flows/01_onboarding.yaml \
            --format junit \
            --output .maestro/results/smoke-results.xml \
            --env APP_ID=com.campus.app \
            || true
        continue-on-error: true

      - name: Run Full Test Suite
        if: github.event.inputs.test_suite == 'full'
        working-directory: apps/mobile
        run: |
          mkdir -p .maestro/results .maestro/screenshots
          
          # Run all test flows
          for flow in .maestro/flows/*.yaml; do
            flow_name=$(basename "$flow" .yaml)
            echo "Running: $flow_name"
            
            maestro test "$flow" \
              --format junit \
              --output ".maestro/results/${flow_name}-results.xml" \
              --env APP_ID=com.campus.app \
              || echo "Test $flow_name completed with errors"
            
            # Small delay between tests
            sleep 5
          done
        continue-on-error: true

      - name: Run Specific Test Suite
        if: github.event.inputs.test_suite != 'smoke' && github.event.inputs.test_suite != 'full' && github.event.inputs.test_suite != ''
        working-directory: apps/mobile
        run: |
          mkdir -p .maestro/results
          
          # Find and run matching flow
          FLOW_FILE=$(ls .maestro/flows/*_${{ github.event.inputs.test_suite }}.yaml 2>/dev/null | head -1)
          
          if [ -n "$FLOW_FILE" ]; then
            echo "Running: $FLOW_FILE"
            maestro test "$FLOW_FILE" \
              --format junit \
              --output .maestro/results/${{ github.event.inputs.test_suite }}-results.xml \
              --env APP_ID=com.campus.app
          else
            echo "No flow found for: ${{ github.event.inputs.test_suite }}"
            exit 1
          fi
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          # Kill Metro bundler
          if [ -n "$METRO_PID" ]; then
            kill $METRO_PID || true
          fi
          
          # Shutdown simulator
          if [ -n "$SIMULATOR_UDID" ]; then
            xcrun simctl shutdown "$SIMULATOR_UDID" || true
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results-${{ matrix.platform }}
          path: |
            apps/mobile/.maestro/results/
            apps/mobile/.maestro/screenshots/
          retention-days: 30

      - name: Upload Test Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-screenshots-${{ matrix.platform }}
          path: apps/mobile/.maestro/screenshots/
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Test Results (${{ matrix.platform }})
          path: apps/mobile/.maestro/results/*.xml
          reporter: java-junit
          fail-on-error: false

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Check Test Results
        run: |
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "E2E tests failed!"
            # Add Slack/Discord/Email notification here
          else
            echo "E2E tests passed!"
          fi
