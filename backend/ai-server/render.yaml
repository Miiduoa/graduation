services:
  - type: web
    name: campus-ai-server
    runtime: docker
    dockerfilePath: ./backend/ai-server/Dockerfile
    dockerContext: ./backend/ai-server
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_COMPAT_MODEL
        value: qwen/qwen3-32b
      - key: PORT
        value: "8100"
      - key: ENABLE_RAG
        value: "false"
      - key: ENABLE_SELF_TRAIN_LOOP
        value: "false"
